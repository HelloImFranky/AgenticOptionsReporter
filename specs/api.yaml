openapi_extension: agentic_options_reporter
version: 1
description: >
  Authoritative contract for the FastAPI surface implemented in
  agentic_options_reporter.main. Handlers must not expose fields not
  declared here without updating this file first.
endpoints:
  - path: /health
    method: GET
    summary: Liveness probe.
    response:
      status: str

  - path: /analyze/{symbol}
    method: GET
    summary: >
      Run the full analysis workflow for a symbol and persist the result.
      Alongside the technicals it gathers cross-provider fundamentals
      (profile, statements, ratios, estimates, metrics, earnings history,
      earnings calendar, insider activity) merged across every configured
      financial provider — best-effort, so a fundamentals failure never
      blocks the analysis (it lands in data_warnings instead). The
      fundamentals are response-only: they are NOT persisted, so a run
      reloaded via GET /runs/{id} has fundamentals=null.
    path_params:
      symbol: str
    query_params:
      lookback_days: int = 365
      expiration: str | null = null
    response: AnalysisResult
    errors:
      404: symbol not found / no data returned by provider
      502: upstream market data provider error

  - path: /runs/{run_id}
    method: GET
    summary: Fetch a previously persisted analysis run.
    path_params:
      run_id: int
    response: AnalysisResult
    errors:
      404: run not found

  - path: /runs
    method: GET
    summary: List recent analysis runs, most recent first.
    query_params:
      symbol: str | null = null
      limit: int = 20
    response: list[AnalysisRunSummary]

  - path: /runs/{run_id}/thesis
    method: POST
    summary: >
      Run the investment-thesis agent pipeline (specs/agents.yaml) over a
      persisted run and store the result. Generation is not free (it
      calls an LLM), so it is a separate, explicit step from /analyze.
    path_params:
      run_id: int
    body: ThesisGenerationRequest   # all fields optional; {} uses server defaults
    response: AgentThesisResult
    errors:
      404: run not found
      409: a thesis already exists for this run and regenerate=false
      422: body.provider is "auto" and body.api_key is set (ambiguous — see specs/llm_providers.yaml)
      502: >
        the requested LLM provider is unsupported, no configured LLM
        provider succeeded (including a missing API key for every
        provider in provider="auto"'s fallback order), or the response
        was unparseable — see specs/llm_providers.yaml. Research DATA
        provider failures (financial/news/macro) are NOT a 502: the run
        completes with a null finding plus an entry in
        pipeline_warnings (see specs/agents.yaml
        provider_failure_mid_run).
    security_note: >
      body.api_key, if supplied, is used only to construct the LlmClient
      for this one request. It is never logged, echoed in the response,
      or persisted alongside the generated thesis.

  - path: /runs/{run_id}/thesis/stream
    method: POST
    summary: >
      Streaming variant of POST /runs/{run_id}/thesis: runs the same agent
      pipeline but reports progress live as Server-Sent Events
      (Content-Type text/event-stream), so a client can show each agent's
      status and its raw prompt/response ("under the hood") as the run
      happens instead of blocking for the whole pipeline. The terminal
      `result` frame carries the full AgentThesisResult, which is persisted
      exactly as the blocking endpoint does. Same request body and the same
      pre-stream guards (404/409/422/502) — those are raised before the
      stream opens, so they still surface as ordinary HTTP errors. Once the
      stream is open, a required-agent failure is reported as an `error`
      frame rather than an HTTP status (headers are already sent).
    path_params:
      run_id: int
    body: ThesisGenerationRequest
    produces: text/event-stream
    sse_events:
      agent: >
        AgentEvent — one per agent phase transition (started / completed /
        skipped / failed). A completed/failed event for an LLM-backed agent
        also carries the raw prompt/response `exchange` and, on completion,
        the parsed `output`.
      result: AgentThesisResult   # terminal on success; also persisted server-side
      error: "{ detail: str }"    # terminal when a required agent failed mid-run
    errors:
      404: run not found
      409: a thesis already exists for this run and regenerate=false
      422: body.provider is "auto" and body.api_key is set
      502: unsupported provider or no configured LLM provider available (pre-stream only)

  - path: /runs/{run_id}/thesis
    method: GET
    summary: Fetch a previously generated thesis for a run.
    path_params:
      run_id: int
    response: AgentThesisResult
    errors:
      404: run not found, or run has no thesis generated yet

models:
  AnalysisResult:
    symbol: str
    run_id: int
    generated_at: datetime
    indicators: IndicatorSnapshot
    trend: TrendAssessment
    volume: VolumeAssessment
    support_resistance: list[SupportResistanceLevel]
    candidates: list[ScoredCandidate]
    recommendation: Recommendation
    fundamentals: FundamentalsSnapshot | null   # cross-provider fundamentals gathered by /analyze; response-only (NOT persisted, so null on /runs/{id} replay)
    data_warnings: list[str]                     # non-fatal problems gathering fundamentals; [] when clean

  # Cross-provider fundamentals surfaced by GET /analyze/{symbol}. Every
  # dataset is merged across every configured financial provider (Yahoo is
  # keyless, so this is always at least partially populated); each field is
  # optional so partial coverage still yields a useful snapshot.
  FundamentalsSnapshot:
    ticker: str
    profile: CompanyProfile | null
    statements: FinancialStatementSummary | null
    ratios: FinancialRatios | null
    estimates: AnalystEstimates | null
    metrics: CompanyMetrics | null
    earnings_history: EarningsHistory | null
    earnings_calendar: EarningsCalendar | null
    insider_activity: InsiderActivity | null

  CompanyMetrics:
    ticker: str
    market_cap: float | null
    pe_ratio: float | null
    forward_pe: float | null
    peg_ratio: float | null
    price_to_book: float | null
    price_to_sales: float | null
    beta: float | null
    dividend_yield: float | null      # fraction, e.g. 0.012 for 1.2%
    week52_high: float | null
    week52_low: float | null
    gross_margin: float | null        # fraction
    operating_margin: float | null    # fraction
    profit_margin: float | null       # fraction
    revenue_growth: float | null      # YoY fraction
    earnings_growth: float | null     # YoY fraction

  EarningsSurprise:
    period: str
    actual_eps: float | null
    estimate_eps: float | null
    surprise: float | null
    surprise_percent: float | null    # fraction

  EarningsHistory:
    ticker: str
    surprises: list[EarningsSurprise]

  EarningsCalendar:
    ticker: str
    next_date: date | null
    eps_estimate: float | null
    revenue_estimate: float | null

  InsiderTransaction:
    name: str
    relationship: str
    transaction_type: str   # buy | sell | raw provider code
    shares: float | null
    value: float | null
    filed_at: date | null

  InsiderActivity:
    ticker: str
    transactions: list[InsiderTransaction]
    net_shares: float | null   # signed sum: buys positive, sells negative

  AnalysisRunSummary:
    run_id: int
    symbol: str
    generated_at: datetime
    recommendation_action: str
    recommendation_confidence: float

  # See specs/agents.yaml for the full agent pipeline contract.
  AgentThesisResult:
    run_id: int
    generated_at: datetime
    quant_interpretation: QuantInterpretation
    financial_research: FinancialResearchFinding | null
    news_research: NewsResearchFinding | null
    macro_research: MacroResearchFinding | null
    catalyst_research: CatalystFinding | null
    risk_assessment: RiskAssessment | null
    strategy_suggestion: StrategySuggestion | null
    investment_thesis: InvestmentThesis
    pipeline_warnings: list[str]   # non-fatal mid-run problems, e.g. a research provider rate limited; [] when clean

  QuantInterpretation:
    narrative: str
    key_factors: list[str]
    score_breakdown: dict[str, float]
    overall_score: float

  FinancialResearchFinding:
    company_health: str      # strong | stable | weak
    growth: str               # accelerating | steady | decelerating
    profitability: str        # high | moderate | low
    cash_flow: str             # positive | neutral | negative
    analyst_consensus: str
    narrative: str

  NewsResearchFinding:
    sentiment: str    # bullish | bearish | neutral
    summary: str
    catalysts: list[str]
    risks: list[str]

  MacroResearchFinding:
    regime: str   # risk_on | risk_off | neutral
    outlook: str
    summary: str

  CatalystItem:
    title: str
    category: str    # earnings | filing | news | macro | corporate_action | other
    horizon: str     # recent | near_term | long_term | unknown
    direction: str   # bullish | bearish | uncertain
    detail: str

  CatalystFinding:
    catalysts: list[CatalystItem]
    summary: str
    net_bias: str   # bullish | bearish | neutral | mixed

  RiskAssessment:
    risk_level: str   # low | medium | high
    concerns: list[str]
    position_sizing_note: str

  StrategySuggestion:
    strategy: str
    rationale: str

  InvestmentThesis:
    thesis: str
    consensus: str   # bullish | bearish | neutral | mixed

  ThesisGenerationRequest:
    provider: str = "auto"            # "auto" fails over across every configured provider; see specs/llm_providers.yaml
    api_key: str | null = null        # overrides the server's configured key for this request only; not valid with provider="auto"
    regenerate: bool = false

  # Emitted only by POST /runs/{run_id}/thesis/stream, one per `agent` SSE
  # frame, so a live view can track the pipeline agent-by-agent.
  AgentExchange:
    system_prompt: str    # the exact system prompt sent to the model
    user_prompt: str      # the exact user prompt sent to the model
    raw_response: str      # the model's raw text response, before parsing

  AgentEvent:
    agent: str            # quant_interpreter | financial_research | news_research | macro_research | catalyst_research | risk_challenger | options_strategy | investment_thesis
    phase: str            # started | completed | skipped | failed
    at: datetime
    exchange: AgentExchange | null   # the raw prompt/response for an LLM-backed agent; null for deterministic or non-run phases
    output: dict | null              # the agent's parsed finding on `completed`; null otherwise
    detail: str | null               # human-readable reason on `skipped`/`failed`
