schema: agentic_options_reporter_providers
version: 2
description: >
  Provider interfaces external data flows through, per the "Agents never
  call APIs directly. Providers abstract external data sources." design
  principle. Each interface is implemented in
  agentic_options_reporter.data.<name>_provider as an ABC plus one or
  more concrete implementations, the same dependency-injection pattern
  as data.market_data.MarketDataProvider and thesis.llm_client.LlmClient.
  Agents (thesis/*.py) only ever depend on these interfaces and the
  normalized Pydantic models they return, never on a concrete provider's
  raw API response shape.

status: phase_2b
phase_2a_scope: >
  One concrete implementation per new interface, chosen for being free
  or keyless to reach for a working prototype (specs/agents.yaml
  Financial/News/Macro Research Agents). Every provider is optional at
  runtime: if unconfigured (no API key / disabled), the orchestrator
  skips the agent that depends on it rather than failing the whole
  thesis pipeline (see specs/agents.yaml no_candidate_short_circuit for
  the precedent — this is the same pattern applied to missing
  configuration instead of missing data).
phase_2b_scope: >
  Adds redundant providers for NewsProvider (Alpha Vantage News, NewsAPI,
  GDELT), FinancialProvider (Alpha Vantage), and MacroProvider (BLS, BEA),
  plus provider_router below — the data-provider analog of
  thesis.llm_client.LlmRouter (specs/llm_providers.yaml). A single
  provider's outage, rate limit, or quota exhaustion no longer skips the
  whole research agent; the router falls over to the next configured
  implementation instead.
deferred:
  - name: catalyst_agent
    reason: >
      Depends on NewsProvider + SECProvider + MacroProvider all being
      wired up; deferred until those three have shipped and proven out.
  - name: additional_market_data_providers
    reason: >
      Alpha Vantage, Twelve Data remain unimplemented alternates to the
      existing YFinanceProvider (price/option-chain data — a different
      interface from FinancialProvider); not needed until a concrete
      reason to switch (rate limits, data quality) arises.
  - name: additional_news_providers
    reason: RSS feeds, Reddit — Alpha Vantage News, NewsAPI, and GDELT shipped in phase_2b.
  - name: production_market_data_providers
    reason: Polygon.io, Tradier, FactSet, Benzinga — paid, deferred until a production deployment needs them.
  - name: production_infrastructure
    reason: Redis, PostgreSQL, Grafana, Prometheus, Loki, Celery, Temporal, pgvector — deferred until this moves beyond a single-process prototype.

provider_router:
  description: >
    agentic_options_reporter.data.provider_router.call_with_fallback is
    the shared implementation behind NewsProviderRouter,
    FinancialProviderRouter, and MacroProviderRouter — one router class
    per interface, each implementing that interface itself (so agents
    can't tell whether they're talking to a single provider or a
    router). Routing happens PER METHOD CALL, not per whole provider
    instance: each router tries its configured providers in priority
    order for one method (e.g. get_cpi), independently of which provider
    answered the previous call. This matters because some providers only
    cover part of an interface (BLS has no GDP data, NewsAPI has no
    sentiment scores) — they raise <X>ProviderUnsupported for the
    methods they don't offer, which is retryable, so the router still
    uses them for what they do support while falling through to another
    provider for the rest.
  error_normalization:
    description: >
      Every provider's HTTP-level failures are classified via
      data.provider_router.classify_requests_error into each interface's
      own error hierarchy (e.g. NewsProviderRateLimited), which multiply
      inherits both that interface's <X>ProviderError base (so existing
      `except NewsProviderError` call sites keep working) and a marker
      from data.provider_errors (so the router can recognize a retryable
      failure generically across all three interfaces).
    hierarchy:
      <X>ProviderError: Base class; also raised directly for non-HTTP failures (e.g. "no observations returned").
      <X>ProviderRateLimited: HTTP 429.
      <X>ProviderTimeout: Request timed out.
      <X>ProviderUnavailable: 5xx response or a network/connection failure.
      <X>ProviderUnsupported: This provider doesn't offer the requested data at all (e.g. BEA has no CPI data).
    retryable_errors: [<X>ProviderRateLimited, <X>ProviderTimeout, <X>ProviderUnavailable, <X>ProviderUnsupported]
    non_retryable_errors: >
      Any other exception (e.g. a malformed-response bug) propagates
      immediately without trying further providers — same principle as
      thesis.llm_client's LlmBadRequest: every provider would fail
      identically on a genuine bug, so failing over would just hide it.
  factories:
    description: >
      Each provider module exposes build_<name>_provider() — mirrors
      thesis.llm_client.build_llm_client(provider="auto", ...). Reads a
      fallback-order env var (comma-separated provider names), skips any
      provider whose API key isn't configured, and raises the
      interface's <X>ProviderError if the resulting router would have
      zero clients. main.py's _optional_<name>_provider() helpers call
      these and catch that error, same "unconfigured = skip the agent"
      contract as phase_2a.
    news: build_news_provider() — AOR_NEWS_PROVIDER_FALLBACK_ORDER, default "finnhub,newsdata,guardian,gnews,alphavantage,newsapi,hackernews"
    financial: build_financial_provider() — AOR_FINANCIAL_PROVIDER_FALLBACK_ORDER, default "fmp,finnhub,alphavantage"
    macro: build_macro_provider() — AOR_MACRO_PROVIDER_FALLBACK_ORDER, default "fred,bls,bea,imf,worldbank"
  keyless_sources_are_always_available: >
    HackerNewsProvider (news) and ImfMacroProvider/WorldBankMacroProvider
    (macro) need no API key, so build_news_provider() and
    build_macro_provider() never return an empty router — News and Macro
    Research effectively always run, at minimum against the keyless
    sources alone. This is intentional, not a contract change: an agent
    still only runs when its provider constructed successfully. Only
    Financial Research still requires at least one configured key.

interfaces:
  NewsProvider:
    module: agentic_options_reporter.data.news   # one adapter per source (base.py, router.py, <source>.py)
    interface_style: >
      ASYNC, like data.financial — adapters share the async-HTTP
      infrastructure in data.async_http (key handling, error
      normalization, class-level TTL response cache, health probes);
      coroutines keep the door open to concurrent fan-out and let
      health() probes run in parallel. The sync thesis pipeline bridges
      with asyncio.run() at the news_research step
      (thesis/orchestrator.py).
    methods:
      search(query: str, start_date: datetime | null = null, end_date: datetime | null = null, language: str = "en", limit: int = 20) -> list[NewsArticle]
      top_headlines(category: str | null = null, limit: int = 20) -> list[NewsArticle]
      health() -> ProviderHealth   # {provider, healthy, latency_ms, detail, checked_at}; probes the source, never raises
    shared_adapter_behavior: >
      All HTTP adapters extend _HttpNewsProvider (base.py): API-key
      handling, httpx-error normalization into the NewsProviderError
      hierarchy, and a CLASS-level TTL response cache
      (CACHE_TTL_SECONDS=300) — process-wide because main.py rebuilds
      providers per request and free tiers meter by the day (Alpha
      Vantage: 25/day), so a "Regenerate" click seconds later must not
      re-spend quota.
    implementations:
      - name: FinnhubNewsProvider
        api_key_env_var: FINNHUB_API_KEY
        free_tier: ~60 requests/min
        base_url: https://finnhub.io/api/v1
        endpoints:
          search: GET /company-news?symbol={query}&from={date}&to={date}   # query treated as a ticker
          top_headlines: GET /news?category={category|general}
        note: English-only source; `language` is ignored.
      - name: NewsDataProvider
        api_key_env_var: NEWSDATA_API_KEY
        free_tier: ~200 requests/day
        base_url: https://newsdata.io/api/1/latest
        endpoints:
          search: GET ?q={query}&language={language}
          top_headlines: GET ?category={category|business}&language=en
        note: >
          The free tier only exposes the latest-news window (the
          /archive endpoint is paid), so start_date/end_date are
          accepted but not forwarded — a documented gap, not silently
          different results.
      - name: GuardianNewsProvider
        api_key_env_var: GUARDIAN_API_KEY
        free_tier: generous
        base_url: https://content.guardianapis.com/search
        endpoints:
          search: GET ?q={query}&from-date={date}&to-date={date}&show-fields=trailText
          top_headlines: GET ?section={category|business}&order-by=newest
        note: The Guardian publishes in English; `language` is ignored.
      - name: GNewsProvider
        api_key_env_var: GNEWS_API_KEY
        free_tier: ~100 requests/day
        base_url: https://gnews.io/api/v4
        endpoints:
          search: GET /search?q={query}&lang={language}&from={ts}&to={ts}
          top_headlines: GET /top-headlines?category={category|business}&lang=en
      - name: AlphaVantageNewsProvider
        api_key_env_var: ALPHA_VANTAGE_API_KEY
        free_tier: ~25 requests/day (why it sits late in the default fallback order)
        base_url: https://www.alphavantage.co/query
        endpoints:
          search: GET ?function=NEWS_SENTIMENT&tickers={query}&time_from={ts}&time_to={ts}   # query treated as a ticker
          top_headlines: GET ?function=NEWS_SENTIMENT&topics={category|financial_markets}
        quirk: >
          The free tier returns HTTP 200 with an "Information"/"Note"
          field instead of a proper 429 when rate limited; treated as
          NewsProviderRateLimited.
      - name: NewsApiOrgProvider
        api_key_env_var: NEWSAPI_API_KEY
        free_tier: ~100 requests/day, development use only per NewsAPI's terms
        base_url: https://newsapi.org/v2
        endpoints:
          search: GET /everything?q={query}&from={date}&to={date}&language={language}
          top_headlines: GET /top-headlines?category={category|business}
      - name: HackerNewsProvider
        api_key_env_var: null   # keyless and unlimited
        base_url: https://hn.algolia.com/api/v1/search
        endpoints:
          search: GET ?query={query}&tags=story&numericFilters=created_at_i>{ts},created_at_i<{ts}
          top_headlines: GET ?tags=front_page
        note: >
          Community/technology discussion rather than journalism — the
          always-available last resort in the default fallback order,
          best treated as supplemental signal.
    removed:
      - name: GdeltNewsProvider
        reason: >
          Removed in favor of the adapter set above. GDELT's per-IP
          throttle (~1 request/5s) rate-limited routine pipeline use
          even after adding caching/spacing/retry defenses, and its
          tone timeline was the only sentiment signal — the
          news_research agent now authors sentiment from the articles
          themselves, so SentimentSnapshot was retired with it.
    deferred:
      - name: reddit
        reason: >
          Community sentiment per the source list, but requires OAuth
          app registration and a token flow, not just an API key —
          heavier setup than the env-var-key pattern every other
          adapter shares. Revisit when community sentiment becomes a
          dedicated signal.
      - name: freenewsapi
        reason: >
          Listed as a generous free tier, but its API contract could
          not be verified against public documentation — implementing
          against a guessed contract would violate the "never silently
          fabricate" rule. Revisit with docs in hand.
      - name: rss_feeds
        reason: Useful supplemental source; needs a feed-list config design first.

  FinancialProvider:
    module: agentic_options_reporter.data.financial   # one adapter per source (base.py, router.py, <source>.py)
    interface_style: >
      ASYNC, like data.news — adapters share the async-HTTP
      infrastructure in data.async_http (key handling, error
      normalization, class-level TTL response cache, health probes).
      The sync thesis pipeline bridges with asyncio.run() at the
      financial_research step, fetching all four datasets CONCURRENTLY
      via asyncio.gather (thesis/orchestrator.py).
    methods:
      get_company_profile(ticker: str) -> CompanyProfile
      get_financial_statements(ticker: str) -> FinancialStatementSummary
      get_ratios(ticker: str) -> FinancialRatios
      get_analyst_estimates(ticker: str) -> AnalystEstimates
      health() -> ProviderHealth   # probes get_company_profile("AAPL"); never raises
    implementations:
      - name: FmpFinancialProvider
        api_key_env_var: FMP_API_KEY
        free_tier: ~250 requests/day; full interface coverage (why it leads the default fallback order)
        base_url: https://financialmodelingprep.com/api/v3
        endpoints:
          get_company_profile: GET /profile/{ticker}
          get_financial_statements: GET /income-statement/{ticker}, /cash-flow-statement/{ticker} (period=annual, limit=1)
          get_ratios: GET /ratios/{ticker} (limit=1)
          get_analyst_estimates: GET /analyst-estimates/{ticker} (limit=1)
      - name: FinnhubFinancialProvider
        api_key_env_var: FINNHUB_API_KEY   # same key as the Finnhub news adapter
        free_tier: ~60 requests/min; PARTIAL interface coverage
        base_url: https://finnhub.io/api/v1
        endpoints:
          get_company_profile: GET /stock/profile2?symbol={ticker} (market cap reported in millions, scaled up; sector not exposed)
          get_financial_statements: >
            Not available on the free tier — raises
            FinancialProviderUnsupported (retryable), so the router
            falls through to FMP/Alpha Vantage for statements while
            still using Finnhub for what it covers, the same
            partial-coverage pattern as BLS/BEA in the macro package.
          get_ratios: GET /stock/metric?symbol={ticker}&metric=all (TTM metrics; percentage figures converted to fractions to match the schema convention)
          get_analyst_estimates: >
            GET /stock/recommendation?symbol={ticker} —
            consensus_rating is DERIVED as the largest bucket of the
            latest month's analyst counts
            (strongBuy/buy/hold/sell/strongSell), a summary of
            provider-supplied tallies with ties breaking toward the
            more cautious label; num_analysts is the sum of counts.
            Price targets are a premium endpoint and stay null rather
            than being guessed.
      - name: AlphaVantageFinancialProvider
        api_key_env_var: ALPHA_VANTAGE_API_KEY
        free_tier: ~25 requests/day (why it sits last in the default fallback order)
        base_url: https://www.alphavantage.co/query
        endpoints:
          get_company_profile: GET ?function=OVERVIEW&symbol={ticker}
          get_financial_statements: >
            GET ?function=INCOME_STATEMENT / ?function=CASH_FLOW —
            free_cash_flow is computed as operatingCashflow minus
            capitalExpenditures (both provider-supplied), a legitimate
            arithmetic derivation, not fabrication.
          get_ratios: >
            GET ?function=OVERVIEW — debt_to_equity and current_ratio
            aren't present in this payload and stay null rather than
            being guessed; gross_margin is computed from
            GrossProfitTTM/RevenueTTM (both provider-supplied).
          get_analyst_estimates: >
            GET ?function=OVERVIEW — only AnalystTargetPrice is
            available (-> price_target_mean); consensus_rating stays
            "N/A" and price_target_high/low/num_analysts stay at their
            schema defaults, the same "missing data stays missing"
            convention FmpFinancialProvider already follows.
        quirk: Same HTTP-200-with-"Information"/"Note" rate-limit quirk as AlphaVantageNewsProvider.
    deferred:
      - name: polygon
        reason: >
          Free tier is heavily rate limited (~5 calls/min) with
          restricted fundamentals access — too constrained to add
          meaningful redundancy over the three free adapters above.
      - name: intrinio_and_factset
        reason: Paid/enterprise services; deferred until a production deployment needs them.
      - name: marketaux_analyst_signals
        reason: Analyst/sentiment signals sit behind a limited tier; revisit if the free adapters' analyst coverage proves insufficient.
      - name: interface_extensions_earnings_insider_ownership_etf
        reason: >
          The source list groups earnings calendars/surprises, insider
          trading (SEC Form 4), institutional ownership (13F), and ETF
          holdings under financial research — all free on FMP/Finnhub/
          SEC EDGAR — but each is a NEW interface method plus new
          normalized models plus prompt/schema/UI changes for the
          financial_research agent, not just a new adapter. Deferred as
          their own pass; the categories map cleanly onto the existing
          adapters when picked up.
      - name: other_source_list_categories
        reason: >
          The remaining categories in the source list map to other
          interfaces that already exist: filings -> SECProvider (SEC
          EDGAR, shipped), macroeconomic -> MacroProvider (FRED/BLS/BEA
          shipped; IMF and World Bank are possible future adapters),
          market_data -> MarketDataProvider (yfinance, shipped),
          ai_research -> thesis.llm_client (multi-provider router,
          shipped). Alternative data (Reddit/Stocktwits/Google Trends/
          OpenInsider) has no owning interface yet.

  MacroProvider:
    module: agentic_options_reporter.data.macro   # one adapter per source (base.py, router.py, <source>.py)
    interface_style: >
      ASYNC, like data.news and data.financial — adapters share the
      async-HTTP infrastructure in data.async_http. The sync thesis
      pipeline bridges with asyncio.run() at the macro_research step,
      fetching rates/CPI/GDP/calendar CONCURRENTLY via asyncio.gather
      (thesis/orchestrator.py). Most macro sources are SPECIALISTS:
      they raise MacroProviderUnsupported (retryable) for series they
      don't publish, so the router composes full coverage out of
      partial providers.
    methods:
      get_interest_rates() -> InterestRates
      get_cpi() -> CpiSnapshot
      get_gdp() -> GdpSnapshot
      get_macro_calendar() -> list[MacroEvent]
      health() -> ProviderHealth   # each adapter probes a series it actually publishes
    implementations:
      - name: FredMacroProvider
        api_key_env_var: FRED_API_KEY
        free_tier: generous; the broadest single source and freshest data (leads the default order)
        base_url: https://api.stlouisfed.org/fred
        endpoints:
          get_interest_rates: GET /series/observations?series_id=FEDFUNDS|DGS10|DGS2 (three series fetched concurrently)
          get_cpi: GET /series/observations?series_id=CPIAUCSL (monthly)
          get_gdp: GET /series/observations?series_id=GDP (quarterly)
          get_macro_calendar: >
            Not available from FRED (a historical-series API, not a
            forward calendar). Returns an empty list — a documented
            gap, not silently faked.
      - name: BlsMacroProvider
        api_key_env_var: BLS_API_KEY
        role: The primary source for the CPI series FRED mirrors — real redundancy on get_cpi.
        base_url: https://api.bls.gov/publicAPI/v2/timeseries/data
        endpoints:
          get_cpi: GET /{series_id} (series_id=CUUR0000SA0, registrationkey={key})
          get_interest_rates: Not published by BLS — raises MacroProviderUnsupported.
          get_gdp: Not published by BLS — raises MacroProviderUnsupported.
          get_macro_calendar: Same documented gap as FRED; returns [].
        quirk: Errors arrive as HTTP-200 bodies with a non-success "status" field; treated as MacroProviderError.
      - name: BeaMacroProvider
        api_key_env_var: BEA_API_KEY
        role: The primary source for the (nominal) GDP series FRED mirrors — real redundancy on get_gdp.
        base_url: https://apps.bea.gov/api/data
        endpoints:
          get_gdp: GET ?method=GetData&datasetname=NIPA&TableName=T10101&Frequency=Q (line 1: Gross domestic product)
          get_cpi: Not published by BEA (its PCE price index is a related but distinct metric) — raises MacroProviderUnsupported.
          get_interest_rates: Not published by BEA — raises MacroProviderUnsupported.
          get_macro_calendar: Same documented gap as FRED; returns [].
      - name: ImfMacroProvider
        api_key_env_var: null   # keyless SDMX-JSON service
        role: >
          International fallback for CPI/GDP; lags the primary US
          agencies, so it sits behind FRED/BLS/BEA in the default order.
        base_url: https://dataservices.imf.org/REST/SDMX_JSON.svc/CompactData/IFS
        endpoints:
          get_cpi: GET /M.US.PCPI_IX?startPeriod={year-2} (monthly CPI index)
          get_gdp: GET /Q.US.NGDP_SA_XDC?startPeriod={year-2} (quarterly nominal GDP, seasonally adjusted)
          get_interest_rates: US policy rates aren't cleanly exposed through IFS — raises MacroProviderUnsupported.
          get_macro_calendar: Same documented gap as FRED; returns [].
        quirk: SDMX-JSON returns a bare dict (not a one-item list) for a single observation; handled.
      - name: WorldBankMacroProvider
        api_key_env_var: null   # keyless
        role: >
          ANNUAL data lagging the US agencies by a year or more — the
          last-resort fallback for when every fresher source is down.
        base_url: https://api.worldbank.org/v2/country/USA/indicator
        endpoints:
          get_cpi: GET /FP.CPI.TOTL?format=json (annual CPI index, 2010=100)
          get_gdp: GET /NY.GDP.MKTP.CD?format=json (annual nominal GDP, current US$)
          get_interest_rates: The Bank's real-interest-rate indicator is a different metric from US policy rates — raises MacroProviderUnsupported.
          get_macro_calendar: Same documented gap as FRED; returns [].
        quirk: Years not yet published carry null values; filtered out rather than treated as zeros.
    yoy_derivations: >
      All adapters compute yoy_change_pct/yoy_growth_pct as the
      arithmetic change between two provider-supplied observations
      (data.macro.base.yoy_change_pct) — a derivation of real data, not
      fabrication; it stays null when the lookback observation isn't
      available.

  SECProvider:
    module: agentic_options_reporter.data.sec_provider
    methods:
      get_recent_filings(ticker: str, limit: int = 10) -> list[SecFiling]
      get_10k(ticker: str) -> SecFiling | null
      get_10q(ticker: str) -> SecFiling | null
      get_8k(ticker: str) -> SecFiling | null
    implementations:
      - name: SecEdgarProvider
        api_key_env_var: null   # SEC EDGAR is free and keyless
        required_header: "User-Agent: <descriptive app name + contact email>, per SEC fair-access policy"
        base_url: https://data.sec.gov
        endpoints:
          ticker_to_cik_lookup: GET https://www.sec.gov/files/company_tickers.json
          get_recent_filings: GET /submissions/CIK{cik:0>10}.json
    note: >
      Not yet wired into a router or agent (reserved for a future
      Catalyst agent); only one implementation exists.
