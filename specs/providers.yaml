schema: agentic_options_reporter_providers
version: 2
description: >
  Provider interfaces external data flows through, per the "Agents never
  call APIs directly. Providers abstract external data sources." design
  principle. Each interface is implemented in
  agentic_options_reporter.data.<name>_provider as an ABC plus one or
  more concrete implementations, the same dependency-injection pattern
  as data.market_data.MarketDataProvider and thesis.llm_client.LlmClient.
  Agents (thesis/*.py) only ever depend on these interfaces and the
  normalized Pydantic models they return, never on a concrete provider's
  raw API response shape.

status: phase_2b
phase_3_note: >
  The Trade Quality Score overhaul (specs/scoring.yaml) widens which
  pipelines depend on which provider interfaces, but introduces NO NEW
  provider interface:
  - MacroProvider and NewsProvider, previously consumed ONLY by the
    optional thesis/Agents-tab pipeline, are now ALSO fetched best-effort
    by /analyze itself (workflow.py _optional_macro_provider /
    _optional_news_provider), feeding the quant Macro and Sentiment
    domain scorers (analysis/domain_scoring.py). Same non-fatal,
    best-effort contract as the existing fundamentals fetch.
  - MarketDataProvider, previously consumed only by /analyze, is now ALSO
    used by the thesis orchestrator (thesis/orchestrator.py
    _fetch_relative_strength_inputs) to fetch a SPY/sector-ETF benchmark
    for relative_strength_research — reusing the existing interface
    rather than adding one for Relative Strength or Statistical Edge.
phase_2a_scope: >
  One concrete implementation per new interface, chosen for being free
  or keyless to reach for a working prototype (specs/agents.yaml
  Financial/News/Macro Research Agents). Every provider is optional at
  runtime: if unconfigured (no API key / disabled), the orchestrator
  skips the agent that depends on it rather than failing the whole
  thesis pipeline (see specs/agents.yaml no_candidate_short_circuit for
  the precedent — this is the same pattern applied to missing
  configuration instead of missing data).
phase_2b_scope: >
  Adds redundant providers for NewsProvider (Alpha Vantage News, NewsAPI,
  GDELT), FinancialProvider (Alpha Vantage), and MacroProvider (BLS, BEA),
  plus provider_router below — the data-provider analog of
  thesis.llm_client.LlmRouter (specs/llm_providers.yaml). A single
  provider's outage, rate limit, or quota exhaustion no longer skips the
  whole research agent; the router falls over to the next configured
  implementation instead.
shipped:
  - name: catalyst_agent
    note: >
      The catalyst_research agent (specs/agents.yaml, phase_2b) combines
      NewsProvider + SECProvider + MacroProvider into a structured list of
      dateable catalysts; SECProvider was async-ified onto data.async_http
      and wired into the pipeline for it.
  - name: multi_provider_market_data
    note: >
      MarketDataProvider became an async, capability-based failover layer
      (data.market_data package) mirroring news/financial/macro: yfinance
      (keyless, both capabilities) plus Alpha Vantage / Twelve Data /
      Finnhub price-history adapters, a capability-filtering router, and
      run_analysis bridged with asyncio.run + gather. See the
      MarketDataProvider section below.
deferred:
  - name: additional_news_providers
    reason: RSS feeds, Reddit — Alpha Vantage News, NewsAPI, and GDELT shipped in phase_2b.
  - name: production_market_data_providers
    reason: Polygon.io, Tradier, FactSet, Benzinga — paid, deferred until a production deployment needs them.
  - name: production_infrastructure
    reason: Redis, PostgreSQL, Grafana, Prometheus, Loki, Celery, Temporal, pgvector — deferred until this moves beyond a single-process prototype.

provider_router:
  description: >
    agentic_options_reporter.data.provider_router.call_with_fallback is
    the shared implementation behind NewsProviderRouter,
    FinancialProviderRouter, and MacroProviderRouter — one router class
    per interface, each implementing that interface itself (so agents
    can't tell whether they're talking to a single provider or a
    router). Routing happens PER METHOD CALL, not per whole provider
    instance: each router tries its configured providers in priority
    order for one method (e.g. search), independently of which provider
    answered the previous call. This matters because some providers only
    cover part of an interface (NewsAPI has no sentiment scores) — they
    raise <X>ProviderUnsupported for the methods they don't offer, which
    is retryable, so the router still uses them for what they do support
    while falling through to another provider for the rest. The MACRO
    router goes a step further (the provider-architecture redesign): its
    providers declare capabilities (supported metric ids) and the router
    FILTERS to supporters before calling
    (data.provider_router.filter_supporting) rather than discovering
    unsupported data by catching an exception — see the MacroProvider
    interface below. News/financial can adopt the same filtering next.
  error_normalization:
    description: >
      Every provider's HTTP-level failures are classified via
      data.provider_router.classify_requests_error into each interface's
      own error hierarchy (e.g. NewsProviderRateLimited), which multiply
      inherits both that interface's <X>ProviderError base (so existing
      `except NewsProviderError` call sites keep working) and a marker
      from data.provider_errors (so the router can recognize a retryable
      failure generically across all three interfaces).
    hierarchy:
      <X>ProviderError: Base class; also raised directly for non-HTTP failures (e.g. "no observations returned").
      <X>ProviderRateLimited: HTTP 429.
      <X>ProviderTimeout: Request timed out.
      <X>ProviderUnavailable: 5xx response or a network/connection failure.
      <X>ProviderUnsupported: This provider doesn't offer the requested data at all (e.g. BEA has no CPI data).
    retryable_errors: [<X>ProviderRateLimited, <X>ProviderTimeout, <X>ProviderUnavailable, <X>ProviderUnsupported]
    non_retryable_errors: >
      Any other exception (e.g. a malformed-response bug) propagates
      immediately without trying further providers — same principle as
      thesis.llm_client's LlmBadRequest: every provider would fail
      identically on a genuine bug, so failing over would just hide it.
  factories:
    description: >
      Each provider module exposes build_<name>_provider() — mirrors
      thesis.llm_client.build_llm_client(provider="auto", ...). Reads a
      fallback-order env var (comma-separated provider names), skips any
      provider whose API key isn't configured, and raises the
      interface's <X>ProviderError if the resulting router would have
      zero clients. main.py's _optional_<name>_provider() helpers call
      these and catch that error, same "unconfigured = skip the agent"
      contract as phase_2a.
    news: build_news_provider() — AOR_NEWS_PROVIDER_FALLBACK_ORDER, default "finnhub,yfinance,newsdata,guardian,gnews,alphavantage,newsapi,hackernews"
    financial: build_financial_provider() — AOR_FINANCIAL_PROVIDER_FALLBACK_ORDER, default "fmp,finnhub,yfinance,alphavantage"
    macro: build_macro_provider() — AOR_MACRO_PROVIDER_FALLBACK_ORDER, default "fred,bls,bea,imf,worldbank"
    market_data: build_market_data_provider() — AOR_MARKET_DATA_PROVIDER_FALLBACK_ORDER, default "yfinance,alphavantage,twelvedata,finnhub"
  keyless_sources_are_always_available: >
    HackerNewsProvider + YFinanceNewsProvider (news),
    ImfMacroProvider/WorldBankMacroProvider (macro), and YFinanceProvider +
    YFinanceFinancialProvider (market data + fundamentals) need no API key,
    so build_news_provider()/build_macro_provider()/build_market_data_provider()/
    build_financial_provider() never return an empty router — News, Macro,
    Financial Research, and the core /analyze pipeline (now including its
    fundamentals snapshot) effectively always run, at minimum against the
    keyless sources alone. Adding keyless Yahoo as a fundamentals source is
    what makes Financial Research and /analyze fundamentals always available;
    an agent still only runs when its provider constructed successfully.

interfaces:
  MarketDataProvider:
    module: agentic_options_reporter.data.market_data   # one adapter per source (base.py, router.py, <source>.py)
    interface_style: >
      ASYNC and CAPABILITY-BASED, like macro/financial. Providers declare
      which capabilities they serve (price_history, option_chain) and the
      router FILTERS to supporters before calling
      (data.provider_router.filter_supporting): free option-chain data is
      rare, so only yfinance advertises option_chain and a chain request
      routes solely to it, while price-history requests fail over across
      every configured source. The sync /analyze pipeline (workflow.py)
      bridges with asyncio.run and fetches price history + chain
      CONCURRENTLY via asyncio.gather.
    capabilities: [price_history, option_chain]
    methods:
      capabilities -> frozenset[str]
      supports(capability: str) -> bool
      get_price_history(symbol: str, lookback_days: int = 365) -> PriceHistory
      get_option_chain(symbol: str, expiration: str | null = null) -> OptionChain
      health() -> ProviderHealth   # probes a cheap price-history fetch; never raises
    implementations:
      - name: YFinanceProvider
        api_key_env_var: null   # keyless
        capabilities: [price_history, option_chain]   # the only option-chain source
        note: >
          Backed by the SYNCHRONOUS `yfinance` package (pandas-returning,
          no async API), so it's the one adapter that can't sit on the
          httpx _HttpMarketDataProvider base — it implements the async
          interface directly and offloads each blocking call to a worker
          thread via asyncio.to_thread. Keeps its own instance-level TTL
          cache. Unexpected yfinance/network errors normalize to
          MarketDataUnavailable (retryable) so the router fails over.
      - name: AlphaVantageMarketDataProvider
        api_key_env_var: ALPHA_VANTAGE_API_KEY
        capabilities: [price_history]
        endpoint: GET /query?function=TIME_SERIES_DAILY&symbol={s}&outputsize={compact|full}
        quirk: Same HTTP-200-with-"Information"/"Note" rate-limit quirk as the other Alpha Vantage adapters.
      - name: TwelveDataMarketDataProvider
        api_key_env_var: TWELVE_DATA_API_KEY   # new env var for this pass
        capabilities: [price_history]
        endpoint: GET /time_series?symbol={s}&interval=1day&outputsize={n}
        note: Returns newest-first; adapter sorts ascending. Errors arrive as {"status":"error","message":...}.
      - name: FinnhubMarketDataProvider
        api_key_env_var: FINNHUB_API_KEY   # same key as the Finnhub news/fundamentals adapters
        capabilities: [price_history]
        endpoint: GET /stock/candle?symbol={s}&resolution=D&from={ts}&to={ts}
        note: >
          /stock/candle moved behind a paid tier for many accounts; where
          unavailable it returns {"s":"no_data"} or 403, which normalize
          to MarketDataError/MarketDataUnavailable so the router fails
          over. Implemented against the documented free contract.
    capability_gating: >
      The HTTP sources serve price history only; _HttpMarketDataProvider's
      get_option_chain raises MarketDataUnsupported (retryable), and they
      don't advertise option_chain — so the router never asks them for a
      chain. If no configured provider serves a capability the router
      raises MarketDataUnsupported (can't happen for option_chain in
      practice since keyless yfinance always serves it).
    configurable_priority: >
      Global order AOR_MARKET_DATA_PROVIDER_FALLBACK_ORDER (default
      "yfinance,alphavantage,twelvedata,finnhub"); per-capability override
      AOR_MARKET_DATA_PRIORITY_<CAP> (e.g.
      AOR_MARKET_DATA_PRIORITY_PRICE_HISTORY="alphavantage,yfinance"),
      mirroring AOR_MACRO_PRIORITY_<METRIC>.
    error_hierarchy: >
      MarketDataError (base) with retryable subclasses
      MarketDataRateLimited/Timeout/Unavailable/Unsupported (the shared
      provider_errors markers), so acall_with_fallback fails over
      generically. main.py maps a MarketDataError out of /analyze to 404.

  NewsProvider:
    module: agentic_options_reporter.data.news   # one adapter per source (base.py, router.py, <source>.py)
    interface_style: >
      ASYNC, like data.financial — adapters share the async-HTTP
      infrastructure in data.async_http (key handling, error
      normalization, class-level TTL response cache, health probes);
      coroutines keep the door open to concurrent fan-out and let
      health() probes run in parallel. The sync thesis pipeline bridges
      with asyncio.run() at the news_research step
      (thesis/orchestrator.py).
    methods:
      capabilities -> frozenset[str]   # the NEWS_CAPABILITIES this provider advertises
      supports(capability: str) -> bool
      search(query: str, start_date: datetime | null = null, end_date: datetime | null = null, language: str = "en", limit: int = 20) -> list[NewsArticle]
      top_headlines(category: str | null = null, limit: int = 20) -> list[NewsArticle]
      health() -> ProviderHealth   # {provider, healthy, latency_ms, detail, checked_at}; probes the source, never raises
    capability_model: >
      Providers declare capabilities (data.news.base.NEWS_CAPABILITIES:
      company_news, general_news, top_headlines). The router PRIORITIZES
      rather than FILTERS by capability
      (data.provider_router.prioritize_supporting): `search` treats the
      query as a ticker/company, so it prefers company_news specialists
      (Finnhub, Yahoo, Alpha Vantage — ticker-aware endpoints) but KEEPS
      general-news providers too (they can still surface a keyword match).
      This is the SOFT counterpart to macro's hard filter_supporting — a
      general-news source genuinely can answer a ticker query (just less
      precisely), whereas World Bank genuinely has no policy rate. The
      router's own `capabilities` is the union across configured adapters.
    routing_model: >
      `search` FANS OUT + MERGES (data.provider_router.acall_and_merge):
      it queries the prioritized providers concurrently and unions their
      articles, de-duplicated by URL (merge_lists), then sorts newest-first
      and trims to `limit` — so coverage is the union of every source
      (Yahoo + Finnhub + …), not just the first that answers. A provider
      failing simply doesn't contribute; it raises only if all fail.
      `top_headlines` stays first-success failover (a single general feed,
      nothing to merge).
    provider_capabilities:
      FinnhubNewsProvider: [company_news, top_headlines]        # /company-news is ticker-aware
      YFinanceNewsProvider: [company_news]                      # keyless; Ticker(.news) is ticker-aware, no general feed
      AlphaVantageNewsProvider: [company_news, top_headlines]   # NEWS_SENTIMENT&tickers= is ticker-aware
      NewsDataProvider: [general_news, top_headlines]
      GuardianNewsProvider: [general_news, top_headlines]
      GNewsProvider: [general_news, top_headlines]
      NewsApiOrgProvider: [general_news, top_headlines]
      HackerNewsProvider: [general_news, top_headlines]
    shared_adapter_behavior: >
      All HTTP adapters extend _HttpNewsProvider (base.py): API-key
      handling, httpx-error normalization into the NewsProviderError
      hierarchy, and a CLASS-level TTL response cache
      (CACHE_TTL_SECONDS=300) — process-wide because main.py rebuilds
      providers per request and free tiers meter by the day (Alpha
      Vantage: 25/day), so a "Regenerate" click seconds later must not
      re-spend quota.
    implementations:
      - name: FinnhubNewsProvider
        api_key_env_var: FINNHUB_API_KEY
        free_tier: ~60 requests/min
        base_url: https://finnhub.io/api/v1
        endpoints:
          search: GET /company-news?symbol={query}&from={date}&to={date}   # query treated as a ticker
          top_headlines: GET /news?category={category|general}
        note: English-only source; `language` is ignored.
      - name: YFinanceNewsProvider
        api_key_env_var: null   # keyless — always available in the merge fan-out
        interface_style: >
          Synchronous `yfinance` wrapped via asyncio.to_thread (like the
          Yahoo market-data/fundamentals adapters). Ticker-aware only:
          serves company_news via Ticker(.news), handling both the legacy
          flat item shape and the newer nested `content` object; has no
          general headline feed, so top_headlines raises Unsupported
          (retryable) and headline routing falls through to other sources.
      - name: NewsDataProvider
        api_key_env_var: NEWSDATA_API_KEY
        free_tier: ~200 requests/day
        base_url: https://newsdata.io/api/1/latest
        endpoints:
          search: GET ?q={query}&language={language}
          top_headlines: GET ?category={category|business}&language=en
        note: >
          The free tier only exposes the latest-news window (the
          /archive endpoint is paid), so start_date/end_date are
          accepted but not forwarded — a documented gap, not silently
          different results.
      - name: GuardianNewsProvider
        api_key_env_var: GUARDIAN_API_KEY
        free_tier: generous
        base_url: https://content.guardianapis.com/search
        endpoints:
          search: GET ?q={query}&from-date={date}&to-date={date}&show-fields=trailText
          top_headlines: GET ?section={category|business}&order-by=newest
        note: The Guardian publishes in English; `language` is ignored.
      - name: GNewsProvider
        api_key_env_var: GNEWS_API_KEY
        free_tier: ~100 requests/day
        base_url: https://gnews.io/api/v4
        endpoints:
          search: GET /search?q={query}&lang={language}&from={ts}&to={ts}
          top_headlines: GET /top-headlines?category={category|business}&lang=en
      - name: AlphaVantageNewsProvider
        api_key_env_var: ALPHA_VANTAGE_API_KEY
        free_tier: ~25 requests/day (why it sits late in the default fallback order)
        base_url: https://www.alphavantage.co/query
        endpoints:
          search: GET ?function=NEWS_SENTIMENT&tickers={query}&time_from={ts}&time_to={ts}   # query treated as a ticker
          top_headlines: GET ?function=NEWS_SENTIMENT&topics={category|financial_markets}
        quirk: >
          The free tier returns HTTP 200 with an "Information"/"Note"
          field instead of a proper 429 when rate limited; treated as
          NewsProviderRateLimited.
      - name: NewsApiOrgProvider
        api_key_env_var: NEWSAPI_API_KEY
        free_tier: ~100 requests/day, development use only per NewsAPI's terms
        base_url: https://newsapi.org/v2
        endpoints:
          search: GET /everything?q={query}&from={date}&to={date}&language={language}
          top_headlines: GET /top-headlines?category={category|business}
      - name: HackerNewsProvider
        api_key_env_var: null   # keyless and unlimited
        base_url: https://hn.algolia.com/api/v1/search
        endpoints:
          search: GET ?query={query}&tags=story&numericFilters=created_at_i>{ts},created_at_i<{ts}
          top_headlines: GET ?tags=front_page
        note: >
          Community/technology discussion rather than journalism — the
          always-available last resort in the default fallback order,
          best treated as supplemental signal.
    removed:
      - name: GdeltNewsProvider
        reason: >
          Removed in favor of the adapter set above. GDELT's per-IP
          throttle (~1 request/5s) rate-limited routine pipeline use
          even after adding caching/spacing/retry defenses, and its
          tone timeline was the only sentiment signal — the
          news_research agent now authors sentiment from the articles
          themselves, so SentimentSnapshot was retired with it.
    deferred:
      - name: reddit
        reason: >
          Community sentiment per the source list, but requires OAuth
          app registration and a token flow, not just an API key —
          heavier setup than the env-var-key pattern every other
          adapter shares. Revisit when community sentiment becomes a
          dedicated signal.
      - name: freenewsapi
        reason: >
          Listed as a generous free tier, but its API contract could
          not be verified against public documentation — implementing
          against a guessed contract would violate the "never silently
          fabricate" rule. Revisit with docs in hand.
      - name: rss_feeds
        reason: Useful supplemental source; needs a feed-list config design first.

  FinancialProvider:
    module: agentic_options_reporter.data.financial   # one adapter per source (base.py, router.py, <source>.py)
    interface_style: >
      ASYNC, like data.news — adapters share the async-HTTP
      infrastructure in data.async_http (key handling, error
      normalization, class-level TTL response cache, health probes).
      The sync thesis pipeline bridges with asyncio.run() at the
      financial_research step, fetching all four datasets CONCURRENTLY
      via asyncio.gather (thesis/orchestrator.py).
    methods:
      supported_datasets -> frozenset[str]   # the FINANCIAL_DATASETS this provider serves
      supports(dataset: str) -> bool
      get_company_profile(ticker: str) -> CompanyProfile
      get_financial_statements(ticker: str) -> FinancialStatementSummary
      get_ratios(ticker: str) -> FinancialRatios
      get_analyst_estimates(ticker: str) -> AnalystEstimates
      get_company_metrics(ticker: str) -> CompanyMetrics                  # valuation/quality key stats
      get_earnings_history(ticker: str) -> EarningsHistory               # past EPS surprises
      get_earnings_calendar(ticker: str) -> EarningsCalendar             # next report + consensus
      get_insider_activity(ticker: str) -> InsiderActivity               # recent insider buys/sells
      health() -> ProviderHealth   # probes get_company_profile("AAPL"); never raises
    capability_model: >
      Providers declare which datasets they serve
      (data.financial.base.FINANCIAL_DATASETS: profile, statements,
      ratios, analyst_estimates, metrics, earnings, earnings_calendar,
      insider). CORE_FINANCIAL_DATASETS is the original four every
      full-coverage source (FMP, Alpha Vantage) serves; the newer four
      arrived as concrete-with-default methods on the interface (default
      raises Unsupported), so an adapter serves one only by advertising it,
      and existing adapters needed no changes. Like macro, the router
      FILTERS (hard) by capability before calling.
    routing_model: >
      FAN-OUT + MERGE, not first-success failover. For each dataset the
      router calls EVERY supporting provider concurrently
      (data.provider_router.acall_and_merge) and combines the successes:
      record datasets (profile/ratios/estimates/metrics/earnings_calendar)
      are unioned field-by-field in priority order (merge_models — first
      PRESENT value wins per field, so Finnhub + Yahoo yields a record
      richer than either alone), and list datasets (earnings/insider) are
      unioned and de-duplicated (merge_lists). A provider that fails simply
      doesn't contribute; the merge raises only if every provider failed —
      "try all providers and get all the data." The ONE exception is
      statements: period-bound, so merging across providers would mix
      reporting periods — it stays first-success failover
      (acall_with_fallback). Per-dataset priority override
      AOR_FINANCIAL_PRIORITY_<DATASET> reorders the field-level tie-break.
      The router's supported_datasets is the union across configured
      adapters; a dataset no provider serves is simply absent, not an error.
    provider_capabilities:
      FmpFinancialProvider: [profile, statements, ratios, analyst_estimates]        # core coverage
      AlphaVantageFinancialProvider: [profile, statements, ratios, analyst_estimates]
      FinnhubFinancialProvider: [profile, ratios, analyst_estimates, metrics, earnings, earnings_calendar, insider]  # no statements on the free tier
      YFinanceFinancialProvider: [profile, statements, ratios, analyst_estimates, metrics, earnings, earnings_calendar, insider]  # keyless, broadest coverage
    implementations:
      - name: FmpFinancialProvider
        api_key_env_var: FMP_API_KEY
        free_tier: ~250 requests/day; full interface coverage (why it leads the default fallback order)
        base_url: https://financialmodelingprep.com/stable   # migrated off /api/v3; stable takes the symbol as a query param, not a path segment
        endpoints:
          get_company_profile: GET /profile?symbol={ticker}
          get_financial_statements: GET /income-statement?symbol={ticker}, /cash-flow-statement?symbol={ticker} (period=annual, limit=1)
          get_ratios: GET /ratios?symbol={ticker} (limit=1)
          get_analyst_estimates: GET /analyst-estimates?symbol={ticker} (period=annual, limit=1)
      - name: FinnhubFinancialProvider
        api_key_env_var: FINNHUB_API_KEY   # same key as the Finnhub news adapter
        free_tier: ~60 requests/min; PARTIAL interface coverage
        base_url: https://finnhub.io/api/v1
        endpoints:
          get_company_profile: GET /stock/profile2?symbol={ticker} (market cap reported in millions, scaled up; sector not exposed)
          get_financial_statements: >
            Not available on the free tier — raises
            FinancialProviderUnsupported (retryable), so the router
            falls through to FMP/Alpha Vantage for statements while
            still using Finnhub for what it covers, the same
            partial-coverage pattern as BLS/BEA in the macro package.
          get_ratios: GET /stock/metric?symbol={ticker}&metric=all (TTM metrics; percentage figures converted to fractions to match the schema convention)
          get_analyst_estimates: >
            GET /stock/recommendation?symbol={ticker} —
            consensus_rating is DERIVED as the largest bucket of the
            latest month's analyst counts
            (strongBuy/buy/hold/sell/strongSell), a summary of
            provider-supplied tallies with ties breaking toward the
            more cautious label; num_analysts is the sum of counts.
            Price targets are a premium endpoint and stay null rather
            than being guessed.
          get_company_metrics: GET /stock/metric?metric=all (valuation/margin/52-week key stats; percentages -> fractions)
          get_earnings_history: GET /stock/earnings (actual vs. estimate EPS per period)
          get_earnings_calendar: GET /calendar/earnings?symbol={ticker} (nearest upcoming report + consensus)
          get_insider_activity: GET /stock/insider-transactions (S=sell / P=buy codes normalized; value = shares × price)
      - name: YFinanceFinancialProvider
        api_key_env_var: null   # keyless — always available, so the fundamentals router is never empty
        free_tier: unofficial Yahoo Finance endpoints via the `yfinance` package (same library as the market-data Yahoo adapter)
        interface_style: >
          The odd one out, like the market-data Yahoo adapter: `yfinance`
          is SYNCHRONOUS and pandas-returning, so it implements the async
          FinancialProvider directly and offloads each blocking call to a
          worker thread via asyncio.to_thread. The single `.info` dict backs
          profile/metrics/ratios/estimates and is cached per ticker so those
          four share one fetch; unexpected yfinance/network errors normalize
          to FinancialProviderUnavailable for the router.
        endpoints:
          get_company_profile / get_company_metrics / get_ratios / get_analyst_estimates: Ticker(.info)
          get_financial_statements: Ticker(.income_stmt / .cashflow)
          get_earnings_history: Ticker(.earnings_dates)
          get_earnings_calendar: Ticker(.calendar)
          get_insider_activity: Ticker(.insider_transactions)
      - name: AlphaVantageFinancialProvider
        api_key_env_var: ALPHA_VANTAGE_API_KEY
        free_tier: ~25 requests/day (why it sits last in the default fallback order)
        base_url: https://www.alphavantage.co/query
        endpoints:
          get_company_profile: GET ?function=OVERVIEW&symbol={ticker}
          get_financial_statements: >
            GET ?function=INCOME_STATEMENT / ?function=CASH_FLOW —
            free_cash_flow is computed as operatingCashflow minus
            capitalExpenditures (both provider-supplied), a legitimate
            arithmetic derivation, not fabrication.
          get_ratios: >
            GET ?function=OVERVIEW — debt_to_equity and current_ratio
            aren't present in this payload and stay null rather than
            being guessed; gross_margin is computed from
            GrossProfitTTM/RevenueTTM (both provider-supplied).
          get_analyst_estimates: >
            GET ?function=OVERVIEW — only AnalystTargetPrice is
            available (-> price_target_mean); consensus_rating stays
            "N/A" and price_target_high/low/num_analysts stay at their
            schema defaults, the same "missing data stays missing"
            convention FmpFinancialProvider already follows.
        quirk: Same HTTP-200-with-"Information"/"Note" rate-limit quirk as AlphaVantageNewsProvider.
    deferred:
      - name: polygon
        reason: >
          Free tier is heavily rate limited (~5 calls/min) with
          restricted fundamentals access — too constrained to add
          meaningful redundancy over the three free adapters above.
      - name: intrinio_and_factset
        reason: Paid/enterprise services; deferred until a production deployment needs them.
      - name: marketaux_analyst_signals
        reason: Analyst/sentiment signals sit behind a limited tier; revisit if the free adapters' analyst coverage proves insufficient.
      - name: interface_extensions_earnings_insider_ownership_etf
        reason: >
          The source list groups earnings calendars/surprises, insider
          trading (SEC Form 4), institutional ownership (13F), and ETF
          holdings under financial research — all free on FMP/Finnhub/
          SEC EDGAR — but each is a NEW interface method plus new
          normalized models plus prompt/schema/UI changes for the
          financial_research agent, not just a new adapter. Deferred as
          their own pass; the categories map cleanly onto the existing
          adapters when picked up.
      - name: other_source_list_categories
        reason: >
          The remaining categories in the source list map to other
          interfaces that already exist: filings -> SECProvider (SEC
          EDGAR, shipped), macroeconomic -> MacroProvider (FRED/BLS/BEA
          shipped; IMF and World Bank are possible future adapters),
          market_data -> MarketDataProvider (yfinance + Alpha Vantage/
          Twelve Data/Finnhub, async multi-provider, shipped),
          ai_research -> thesis.llm_client (multi-provider router,
          shipped). Alternative data (Reddit/Stocktwits/Google Trends/
          OpenInsider) has no owning interface yet.

  MacroProvider:
    module: agentic_options_reporter.data.macro   # base.py, metrics.py, router.py, <source>.py
    interface_style: >
      ASYNC and CAPABILITY-BASED (the provider-architecture redesign).
      Unlike news/financial (a fixed set of methods, Unsupported caught
      mid-call), a macro provider declares which METRIC IDS it serves
      (supported_metrics) and fetches any one through a single
      fetch(metric_id) -> MacroObservation coroutine. The router SELECTS
      providers that advertise a metric before calling
      (data.provider_router.filter_supporting), so a specialist is never
      asked for data it lacks — the fix for "World Bank has no US policy
      rate." Adding a metric is a registry entry plus the adapters that
      serve it; no new interface method, no provider forced to stub out
      data it doesn't have. The sync thesis pipeline bridges with
      asyncio.run() and fetches every serveable default metric
      concurrently via asyncio.gather.
    metric_registry:
      module: agentic_options_reporter.data.macro.metrics
      model: >
        MacroMetric(id, label, category, country="US", frequency, unit)
        — structured data, the doc's "better long-term" alternative to a
        growing capability enum.
      metrics:
        policy_rate: Federal funds rate (interest_rate, monthly, percent) — FRED series FEDFUNDS
        treasury_10y: 10-year Treasury yield (interest_rate, daily, percent) — FRED series DGS10
        treasury_2y: 2-year Treasury yield (interest_rate, daily, percent) — FRED series DGS2
        cpi: Consumer Price Index (prices, monthly, index)
        gdp: Gross domestic product, nominal (output, quarterly, usd)
      default_request: DEFAULT_MACRO_METRICS = [policy_rate, treasury_10y, treasury_2y, cpi, gdp]
    output:
      model: >
        MacroObservation(metric_id, label, value, unit, as_of, source,
        yoy_change_pct | null) — the single normalized output type, with
        `source` recording which provider actually answered.
    methods:
      supported_metrics -> frozenset[str]   # the metric ids this provider serves
      supports(metric_id: str) -> bool
      fetch(metric_id: str) -> MacroObservation   # raises MacroProviderUnsupported for an unadvertised metric
      health() -> ProviderHealth   # probes the first supported metric; never raises
    provider_capabilities:
      FredMacroProvider:
        api_key_env_var: FRED_API_KEY
        serves: [policy_rate, treasury_10y, treasury_2y, cpi, gdp]   # the only full-coverage source
      BlsMacroProvider:
        api_key_env_var: BLS_API_KEY
        serves: [cpi]   # primary CPI source FRED mirrors
      BeaMacroProvider:
        api_key_env_var: BEA_API_KEY
        serves: [gdp]   # primary GDP source FRED mirrors
      ImfMacroProvider:
        api_key_env_var: null   # keyless
        serves: [cpi, gdp]   # lags US agencies; late in the order
      WorldBankMacroProvider:
        api_key_env_var: null   # keyless
        serves: [cpi, gdp]   # annual, last resort; NOT policy_rate (the original bug)
    configurable_priority: >
      The global order is AOR_MACRO_PROVIDER_FALLBACK_ORDER (default
      "fred,bls,bea,imf,worldbank"). A per-metric override
      AOR_MACRO_PRIORITY_<METRIC> (e.g.
      AOR_MACRO_PRIORITY_GDP="bea,fred,worldbank") reorders the
      candidates for one metric — the doc's section-6 "configurable
      priority" without a YAML file on the deployment surface.
    yoy_derivations: >
      yoy_change_pct is the arithmetic change between two
      provider-supplied observations (data.macro.base.yoy_change_pct),
      computed for prices/output and left null for point-in-time rates
      or when the lookback observation is missing.
    orchestration: >
      macro_research requests DEFAULT_MACRO_METRICS; the orchestrator
      fetches only those the router supports (router.supports(metric)),
      concurrently. Metrics no configured provider advertises are simply
      absent from what the agent sees (expected, not an error — the doc's
      "treat unsupported metrics as expected behavior"). A configured
      provider failing to serve a metric it DOES advertise propagates as
      MacroProviderError and becomes a pipeline_warning as usual.

  SECProvider:
    module: agentic_options_reporter.data.sec_provider
    interface_style: >
      ASYNC, like news/financial/macro — SecEdgarProvider extends the
      shared async-HTTP infrastructure in data.async_http (httpx-error
      normalization into the SecProviderError hierarchy, class-level TTL
      response cache, health probe). One keyless source and no failover
      router (EDGAR is the sole free provider of the full filings index),
      so this stays a single adapter module rather than a package. The
      sync thesis pipeline bridges with asyncio.run() at the
      catalyst_research step (thesis/orchestrator._fetch_catalyst_inputs).
    methods:
      get_recent_filings(ticker: str, limit: int = 10) -> list[SecFiling]
      get_10k(ticker: str) -> SecFiling | null
      get_10q(ticker: str) -> SecFiling | null
      get_8k(ticker: str) -> SecFiling | null
      health() -> ProviderHealth   # probes the ticker->CIK map; never raises
    implementations:
      - name: SecEdgarProvider
        api_key_env_var: null   # SEC EDGAR is free and keyless
        required_header: "User-Agent: <descriptive app name + contact email>, per SEC fair-access policy (SEC_EDGAR_USER_AGENT)"
        base_url: https://data.sec.gov
        endpoints:
          ticker_to_cik_lookup: GET https://www.sec.gov/files/company_tickers.json   # parsed map memoized on the instance
          get_recent_filings: GET /submissions/CIK{cik:0>10}.json
        errors: >
          httpx errors normalize into SecProviderError with retryable
          subclasses SecProviderRateLimited/Timeout/Unavailable (the same
          markers the other async adapters use), so a future
          SECProviderRouter or catalyst fan-out can treat SEC failures
          generically.
    note: >
      Wired into the catalyst_research agent (specs/agents.yaml) as the
      filings stream; SEC EDGAR is the only implementation. Keyless, so it
      is always available — the catalyst agent always has at least filings.
